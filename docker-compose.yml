services:
  app:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
      - "6006:6006"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    command: sleep infinity
    stdin_open: true
    tty: true

volumes:
  node_modules:
